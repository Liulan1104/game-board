<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 游戏行业看板</title>
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #161929;
      --surface2: #1e2236;
      --border: #2a2f4a;
      --accent: #7c6cf8;
      --accent2: #f97316;
      --accent3: #22d3ee;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 12px;
    }

    [data-theme="light"] {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #edf0f7;
      --border: #dde2ee;
      --accent: #6c5ce7;
      --accent2: #e17055;
      --accent3: #0984e3;
      --green: #00b894;
      --red: #e74c3c;
      --yellow: #fdcb6e;
      --text: #1e2533;
      --text2: #5a6175;
      --text3: #9aa3b5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(90deg, #7c6cf8, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-icon { font-size: 24px; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .date-badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      color: var(--text2);
    }

    .date-badge span { color: var(--accent3); font-weight: 600; }

    .tab-nav {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 4px;
    }

    .tab-btn {
      padding: 6px 20px;
      border-radius: 20px;
      border: none;
      background: transparent;
      color: var(--text2);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .tab-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── Search Bar ── */
    .search-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 36px 8px 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text3); }
    .search-clear {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 4px;
      display: none;
    }
    .search-clear.show { display: block; }
    .date-range {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .date-range input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 7px 10px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      cursor: pointer;
      color-scheme: dark;
    }
    .date-range input:focus { border-color: var(--accent); }
    .date-range span { color: var(--text3); font-size: 12px; }
    .search-result-label {
      font-size: 13px;
      color: var(--accent3);
      margin-bottom: 10px;
      display: none;
    }
    .search-result-label.show { display: block; }

    /* ── Main Layout ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    @media (max-width: 1100px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .si-purple { background: rgba(124,108,248,0.15); }
    .si-orange { background: rgba(249,115,22,0.15); }
    .si-cyan { background: rgba(34,211,238,0.15); }
    .si-green { background: rgba(52,211,153,0.15); }
    .si-yellow { background: rgba(251,191,36,0.15); }

    .stat-info { min-width: 0; }
    .stat-num { font-size: 24px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .sn-purple { color: var(--accent); }
    .sn-orange { color: var(--accent2); }
    .sn-cyan { color: var(--accent3); }
    .sn-green { color: var(--green); }
    .sn-yellow { color: var(--yellow); }

    /* ── News List ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: var(--accent);
      border-radius: 2px;
    }

    .filter-row {
      display: flex;
      gap: 8px;
    }

    .filter-chip {
      padding: 4px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .filter-chip.active, .filter-chip:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .news-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .news-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      border-radius: 3px 0 0 3px;
    }

    .news-card.cat-手游::before { background: var(--accent); }
    .news-card.cat-端游::before { background: var(--accent2); }
    .news-card.cat-电竞::before { background: var(--accent3); }
    .news-card.cat-行业::before { background: var(--green); }
    .news-card.cat-IP::before { background: var(--yellow); }

    .news-card:hover {
      border-color: var(--accent);
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .news-rank {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .rank-1 { background: linear-gradient(135deg, #fbbf24, #f97316); color: #fff; }
    .rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: #fff; }
    .rank-3 { background: linear-gradient(135deg, #d97706, #92400e); color: #fff; }
    .rank-other { background: var(--surface2); color: var(--text3); }

    .news-body { flex: 1; min-width: 0; }

    .news-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .news-source {
      font-size: 11px;
      color: var(--text3);
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .tag-手游 { background: rgba(124,108,248,0.2); color: #a5a0ff; }
    .tag-端游 { background: rgba(249,115,22,0.2); color: #fba06a; }
    .tag-电竞 { background: rgba(34,211,238,0.2); color: #67e8f9; }
    .tag-行业 { background: rgba(52,211,153,0.2); color: #6ee7b7; }
    .tag-IP { background: rgba(251,191,36,0.2); color: #fcd34d; }

    .hot-badge {
      font-size: 11px;
      color: var(--red);
      font-weight: 600;
    }

    /* ── Date Picker Bar ── */
    .date-picker-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .date-picker-label { font-size: 13px; color: var(--text3); white-space: nowrap; font-weight: 500; }
    .date-picker-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
    .dchip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dchip:hover { border-color: var(--accent); color: var(--accent); }
    .dchip.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

    /* ── Section Divider ── */
    .section-divider {
      height: 12px;
    }

    /* ── Custom Date Picker ── */
    .date-picker-custom {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .date-picker-custom input[type="date"] {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-size: 12px;
      padding: 4px 10px;
      cursor: pointer;
    }
    .date-picker-custom input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
      cursor: pointer;
    }
    .custom-date-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .custom-date-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Footer Note ── */
    .news-footer-note {
      margin-top: 16px;
      padding: 10px 16px;
      background: rgba(124,108,248,0.06);
      border: 1px solid rgba(124,108,248,0.2);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text3);
      text-align: center;
    }

    /* ── Calendar View ── */
    .calendar-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .cal-title { font-size: 18px; font-weight: 700; }
    .cal-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }

    .cal-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cal-nav-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .cal-nav-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
    }

    .cal-month-label {
      font-size: 16px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
    }

    .cal-weekday {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: var(--text3);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .cal-weekday:first-child, .cal-weekday:last-child {
      color: var(--accent);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .cal-cell {
      min-height: 110px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
      cursor: default;
      transition: background 0.15s;
      position: relative;
    }

    .cal-cell:nth-child(7n) { border-right: none; }

    .cal-cell:hover { background: var(--surface2); }

    .cal-cell.other-month { opacity: 0.3; }

    .cal-cell.today {
      background: rgba(124,108,248,0.08);
    }

    .cal-cell.today .cal-day-num {
      background: var(--accent);
      color: #fff;
    }

    .cal-day-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text2);
    }

    .cal-cell.weekend .cal-day-num {
      color: var(--accent);
    }

    .game-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 3px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1.3;
      overflow: hidden;
    }

    .game-pill:hover { filter: brightness(1.2); transform: scale(1.02); }

    .gp-major {
      background: rgba(124,108,248,0.25);
      color: #c4b5fd;
      border: 1px solid rgba(124,108,248,0.4);
    }

    .gp-mid {
      background: rgba(249,115,22,0.2);
      color: #fdba74;
      border: 1px solid rgba(249,115,22,0.3);
    }

    .gp-minor {
      background: rgba(234,179,8,0.12);
      color: #fbbf24;
      border: 1px solid rgba(234,179,8,0.25);
    }

    .gp-test {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.25);
    }

    .gp-release {
      background: rgba(249,115,22,0.12);
      color: #fb923c;
      border: 1px solid rgba(249,115,22,0.25);
    }

    [data-theme="light"] .gp-minor {
      background: rgba(217,119,6,0.1);
      color: #d97706;
      border-color: rgba(217,119,6,0.2);
    }
    [data-theme="light"] .gp-test {
      background: rgba(37,99,235,0.1);
      color: #2563eb;
      border-color: rgba(37,99,235,0.2);
    }
    [data-theme="light"] .gp-release {
      background: rgba(249,115,22,0.1);
      color: #ea580c;
      border-color: rgba(249,115,22,0.2);
    }

    

    .more-pill {
      font-size: 11px;
      color: var(--text3);
      padding: 2px 4px;
      cursor: pointer;
    }

    /* ── Game List beside calendar ── */
    .calendar-layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 20px;
    }

    .game-sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .sidebar-title {
      padding: 14px 16px;
      font-size: 14px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-list { padding: 8px 0; }

    .sidebar-item {
      padding: 10px 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(42,47,74,0.5);
    }

    .sidebar-item:last-child { border-bottom: none; }
    .sidebar-item:hover { background: var(--surface2); }

    .si-date {
      width: 40px;
      text-align: center;
      flex-shrink: 0;
    }

    .sid-month { font-size: 10px; color: var(--text3); text-transform: uppercase; }
    .sid-day { font-size: 20px; font-weight: 700; color: var(--accent); line-height: 1; }
    .sid-week { font-size: 10px; color: var(--text3); }

    .si-info { flex: 1; min-width: 0; }
    .sin-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
    .sin-meta { font-size: 11px; color: var(--text3); display: flex; gap: 6px; }

    .level-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    /* 手游/端游标签颜色 */
    .lb-mobile { background: rgba(124,108,248,0.2); color: #a5a0ff; }
    .lb-pc { background: rgba(34,211,238,0.15); color: #67e8f9; }
    .lb-test { background: rgba(52,211,153,0.15); color: #6ee7b7; }
    .lb-other { background: rgba(148,163,184,0.2); color: #94a3b8; }

    /* ── Legend ── */
    .cal-legend {
      display: flex;
      gap: 16px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Calendar Stats Bar ── */
    .cal-stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }

    .cal-cat-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cal-cat-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .cal-cat-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .cal-cat-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 500;
    }

    .cal-stat-item {
      text-align: center;
      padding: 6px 14px;
      background: var(--surface2);
      border-radius: 8px;
    }

    .cal-stat-num {
      font-size: 18px;
      font-weight: 700;
    }

    .cal-stat-label {
      font-size: 11px;
      color: var(--text3);
    }

    .cs-orange { color: #f97316; }
    .cs-green { color: #34d399; }
    .cs-cyan { color: #22d3ee; }
    .cs-yellow { color: #fbbf24; }
      background: var(--surface2);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 3px;
    }

    /* ── Sidebar Category Chips ── */
    .cal-cat-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px 16px;
    }
    .cal-chip {
      padding: 5px 12px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .cal-chip:hover { border-color: var(--accent); color: var(--accent); }
    .cal-chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 460px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-overlay.open .modal {
      transform: scale(1);
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      margin-top: -4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-tag { display: inline-block; margin-bottom: 10px; }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; line-height: 1.4; }
    .modal-meta { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .modal-body { font-size: 14px; line-height: 1.8; color: var(--text2); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 1024px) {
      .calendar-layout { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(3, 1fr); }
      .news-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      header { padding: 0 16px; }
      .tab-nav { display: none; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      main { padding: 16px; }
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .view.active .news-card,
    .view.active .stat-card {
      animation: fadeIn 0.3s ease both;
    }

    .view.active .news-card:nth-child(1) { animation-delay: 0.02s; }
    .view.active .news-card:nth-child(2) { animation-delay: 0.04s; }
    .view.active .news-card:nth-child(3) { animation-delay: 0.06s; }
    .view.active .news-card:nth-child(4) { animation-delay: 0.08s; }
    .view.active .news-card:nth-child(5) { animation-delay: 0.10s; }
    .view.active .news-card:nth-child(6) { animation-delay: 0.12s; }

    .mobile-tabs {
      display: none;
      padding: 16px;
      gap: 8px;
    }

    @media (max-width: 640px) {
      .mobile-tabs { display: flex; }
    }

    /* ── Page Footer ── */
    .page-footer {
      text-align: center;
      padding: 16px 20px;
      font-size: 11px;
      line-height: 1.8;
      color: var(--text3);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    [data-theme="light"] .page-footer { background: var(--surface); }

const newsDataRaw = {};  // 运行时从 GitHub 填充，失败则用 fallback
let gamesData = [];      // 运行时从 GitHub 填充

// 获取最近N天的日期列表
function getRecentDates(days = 30) {
  const dates = [];
  for (let i = 0; i < days; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

// 将 eventType 映射为 category
function mapGameCategory(g) {
  const eventTypeMap = {
    'release': '上线',
    'test': '测试',
    'anniversary': '周年庆'
  };
  return {
    ...g,
    category: g.category || eventTypeMap[g.eventType] || g.eventType || '其他',
    genre: g.genre || g.type || g.note || ''
  };
}

// 从 GitHub 加载数据（失败则用内嵌备用数据）
async function loadOnlineData() {
  try {
    const [gamesRes] = await Promise.all([
      fetch(`${DATA_BASE}/games.json?_=${Date.now()}`, { cache: 'no-store' })
    ]);
    if (gamesRes.ok) {
      const rawData = await gamesRes.json();
      gamesData = rawData.map(mapGameCategory);
    } else {
      // GitHub 加载失败，使用备用数据
      gamesData = fallbackGamesData.map(mapGameCategory);
    }

    // 从 daily/ 文件夹加载最近30天的新闻数据
    const recentDates = getRecentDates(30);
    const dailyPromises = recentDates.map(date =>
      fetch(`${DATA_BASE}/daily/${date}.json?_=${Date.now()}`, { cache: 'no-store' })
        .then(r => r.ok ? r.json() : null)
        .catch(() => null)
    );

    const dailyResults = await Promise.all(dailyPromises);
    let hasOnlineData = false;
    dailyResults.forEach(report => {
      if (report && report.date && report.news) {
        newsDataRaw[report.date] = report.news;
        hasOnlineData = true;
      }
    });

    // 如果没有从 GitHub 加载到任何数据，使用备用数据
    if (!hasOnlineData) {
      Object.keys(fallbackNewsDataRaw).forEach(date => {
        newsDataRaw[date] = fallbackNewsDataRaw[date];
      });
    }
  } catch (e) {
    console.warn('⚠️ 数据加载失败，使用备用数据：', e.message);
    // 使用备用数据
    Object.keys(fallbackNewsDataRaw).forEach(date => {
      newsDataRaw[date] = fallbackNewsDataRaw[date];
    });
    gamesData = fallbackGamesData.map(mapGameCategory);
  }
}

let newsData = []; // 扁平化后的有效新闻

// 从分组数据展开为扁平数组（去重，按日期+rank去重）
function buildNewsData() {
  const seen = new Set();
  const result = [];
  // 按日期降序遍历（最新的在前面）
  const dates = Object.keys(newsDataRaw).sort().reverse();
  dates.forEach(date => {
    (newsDataRaw[date] || []).forEach(item => {
      const key = date + '|' + item.rank;
      if (!seen.has(key)) {
        seen.add(key);
        result.push({ ...item, date });
      }
    });
  });
  return result;
}

// 过滤超出365天的数据（相对于今天）
function filterExpired(rawData, days = 365) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  const cutoffStr = formatDate(cutoff);
  // 过滤掉超期数据
  const filtered = {};
  Object.keys(rawData).forEach(date => {
    if (date >= cutoffStr) {
      filtered[date] = rawData[date];
    }
  });
  return filtered;
}

function renderNews() {
  renderNewsStats();

  const grid = document.getElementById('newsGrid');
  const searchLabel = document.getElementById('newsSearchLabel');
  const sectionTitle = document.getElementById('newsSectionTitle');

  // 关键词搜索（搜索title和detail）
  let items = searchQuery
    ? newsData.filter(n => n.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                          (n.detail && n.detail.toLowerCase().includes(searchQuery.toLowerCase())))
    : [...newsData];

// 日期范围筛选
  if (searchDateFrom) {
    items = items.filter(n => n.date >= searchDateFrom);
  }
  if (searchDateTo) {
    items = items.filter(n => n.date <= searchDateTo);
  }

// 单日筛选
  if (selectedDay) {
    items = items.filter(n => n.date === selectedDay);
  }

  // 分类筛选
  if (currentFilter !== 'all') {
    items = items.filter(n => n.cat === currentFilter);
  }

  // 标题逻辑：有搜索词 → "搜索结果"；单日选中 → "X月X日热点"；默认 → "昨日热点"
  if (searchQuery) {
    searchLabel.textContent = `共 ${items.length} 条结果${currentFilter !== 'all' ? '（已选' + currentFilter + '分类）' : ''}`;
    searchLabel.classList.add('show');
    sectionTitle.textContent = '🔍 搜索结果';
  } else if (selectedDay) {
    const parts = selectedDay.split('-');
    const label = `${parseInt(parts[1])}月${parseInt(parts[2])}日热点`;
    sectionTitle.textContent = label;
    searchLabel.classList.remove('show');
  } else {
    sectionTitle.textContent = '昨日热点';
    searchLabel.classList.remove('show');
  }

  if (items.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text3);font-size:14px">没有找到符合条件的新闻</div>';
    return;
  }

  grid.innerHTML = items.map(n => {
    const rankClass = n.rank === 1 ? 'rank-1' : n.rank === 2 ? 'rank-2' : n.rank === 3 ? 'rank-3' : 'rank-other';
    return `
      <div class="news-card cat-${n.cat}" onclick="openNewsDetail('${n.date}', ${n.rank})">

        <div class="news-body">

          <div class="news-meta">
            <span class="news-source">${n.source}</span>
            <span class="tag tag-${n.cat}">${n.cat}</span>
            <span class="hot-badge">🔥 ${n.hot}</span>
            <span style="color:var(--text3);font-size:11px;margin-left:4px">${n.date}</span>
          </div>
        </div>
      </div>
`;
  }).join('');
}

let calYear = 2026;
let calMonth = 3; // 0-indexed: 3 = April

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function getGameKey(date) {
  // date is a Date object, return yyyy-mm-dd
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function buildGameMap() {
  const map = {};
  gamesData.forEach(g => {
    if (!map[g.date]) map[g.date] = [];
    map[g.date].push(g);
  });
  return map;
}

function renderCalendar() {
  const title = `${calYear}年 ${monthNames[calMonth]}`;
  document.getElementById('calTitle').textContent = title;
  document.getElementById('calMonthLabel').textContent = `${calYear}年${monthNames[calMonth]}`;

  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay(); // 0=Sun

  const gameMap = buildGameMap();
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Prev month fill
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth, -startDow + i + 1);
    const cell = buildCell(d, gameMap, true);
    grid.appendChild(cell);
  }

  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const cell = buildCell(date, gameMap, false);
    grid.appendChild(cell);
  }

  // Next month fill
  const total = startDow + lastDay.getDate();
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(calYear, calMonth + 1, i);
    const cell = buildCell(d, gameMap, true);
    grid.appendChild(cell);
  }

  renderUpcoming();
  renderStatsGrid();
  renderCalendarWithMap(gameMap);
}

  const dayNum = document.createElement('div');
  dayNum.className = 'cal-day-num';
  dayNum.textContent = date.getDate();

  // 根据分类筛选过滤
  const filteredGames = calCategoryFilter === 'all' ? games : games.filter(g => g.category === calCategoryFilter);
  const maxShow = 2;
  filteredGames.slice(0, maxShow).forEach(g => {
    const pill = document.createElement('div');
    // 根据分类着色：上线橙色、测试蓝色、周年庆黄色
    const cls = g.category === '上线' ? 'gp-release' : g.category === '测试' ? 'gp-test' : 'gp-minor';
    pill.className = `game-pill ${cls}`;
    pill.textContent = g.name;
    pill.title = `${g.name} - ${g.company}`;
    pill.onclick = () => openGame(g);
    cell.appendChild(pill);
  });

  if (filteredGames.length > maxShow) {
    const more = document.createElement('div');
    more.className = 'more-pill';
    more.textContent = `+${filteredGames.length - maxShow} 更多`;
    cell.appendChild(more);
  }

  return cell;
}

function renderUpcoming() {
  const today = new Date();
  const upcoming = gamesData
    .filter(g => {
      const d = new Date(g.date);
      if (isNaN(d)) return false;
      const diff = (d - today) / 86400000;
      return diff >= -1 && diff <= 30;
    })
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  const list = document.getElementById('upcomingList');
  // 根据侧边栏筛选的分类过滤
  const filtered = sidebarCatFilter === 'all' ? upcoming : upcoming.filter(g => g.category === sidebarCatFilter);
  list.innerHTML = filtered.map(g => {
    const d = new Date(g.date);
    const m = monthNames[d.getMonth()];
    const day = d.getDate();
    const weeks = ['日','一','二','三','四','五','六'];
    const w = '周' + weeks[d.getDay()];
    // 分类标签颜色
    const catColor = { '上线': 'lb-s', '测试': 'lb-test', '周年庆': 'lb-b' }[g.category] || 'lb-other';
    const catLabel = { '上线': '📦 上线', '测试': '🧪 测试', '周年庆': '🎉 周年庆' }[g.category] || g.category;
    return `
      <div class="sidebar-item" onclick='openGame(${JSON.stringify(g)})'>
        <div class="si-date">
          <div class="sid-month">${m}</div>
          <div class="sid-day">${day}</div>
          <div class="sid-week">${w}</div>
        </div>
        <div class="si-info">
          <div class="sin-title">${g.name} <span class="level-badge ${catColor}">${catLabel}</span></div>
          <div class="sin-meta"><span>${g.company}</span><span>${g.platform}</span></div>
          <div class="sin-meta" style="color:#64748b;font-size:10px;margin-top:2px">${g.note}</div>
        </div>
      </div>
    `;
  }).join('');
}

// 带筛选的日历渲染
function renderCalendarWithMap(gameMap) {
  const today = new Date();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  // Prev month fill
  for (let i = 0; i < startDow; i++) {
    const d = new Date(calYear, calMonth, -startDow + i + 1);
    const cell = buildCell(d, gameMap, true);
    grid.appendChild(cell);
  }

  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(calYear, calMonth, d);
    const cell = buildCell(date, gameMap, false);
    grid.appendChild(cell);
  }

  // Next month fill
  const total = startDow + lastDay.getDate();
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const d = new Date(calYear, calMonth + 1, i);
    const cell = buildCell(d, gameMap, true);
    grid.appendChild(cell);
  }
}

function openGame(g) {
  // 分类标签
  const catColor = { '上线': 'lb-s', '测试': 'lb-test', '周年庆': 'lb-b' }[g.category] || 'lb-other';
  const catLabel = { '上线': '📦 公测/上线', '测试': '🧪 测试', '周年庆': '🎉 周年庆' }[g.category] || g.category;
  document.getElementById('modalContent').innerHTML = `
    <span class="level-badge ${catColor} modal-tag" style="font-size:13px;padding:4px 12px">${catLabel}</span>
    <div class="modal-title">${g.name}</div>
    <div class="modal-meta">📅 上线日期：${g.date} &nbsp;|&nbsp; 🏢 厂商：${g.company}</div>
    <hr class="modal-divider">
    <div class="modal-body">
      <p>🎮 <strong>类型：</strong>${g.genre}</p>
      <p style="margin-top:8px">📱 <strong>平台：</strong>${g.platform}</p>
      <p style="margin-top:8px">💡 <strong>备注：</strong>${g.note}</p>
      ${g.source ? `<p style="margin-top:8px"><strong>📎 官方来源：</strong><a href="${g.source}" target="_blank" style="color:#3b82f6;text-decoration:none">${g.source}</a></p>` : ''}
    </div>
  `;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal({target: document.getElementById('modalOverlay')});
});

async function init() {
  // 先从 GitHub 加载数据
  await loadOnlineData();

  // Set today date
  const now = new Date();
  const todayStr = formatDate(now);
  const monthDay = `${now.getMonth() + 1}月${now.getDate()}日`;
  document.getElementById('todayBadge').textContent = monthDay;

  // ── 365天自动清除：过滤超期数据 ──
  const days365 = {};
  Object.keys(newsDataRaw).forEach(date => {
    if (date >= todayStr) {
      days365[date] = newsDataRaw[date];
    }
  });
  newsData = buildNewsData();

  // 设置日期范围筛选器（默认最近30天）
  const toDate = todayStr;
  const fromDate = formatDate(new Date(now.getTime() - 29 * 24 * 60 * 60 * 1000));
  document.getElementById('newsDateFrom').value = fromDate;
  document.getElementById('newsDateTo').value = toDate;
  document.getElementById('newsDateFrom').max = toDate;
  document.getElementById('newsDateTo').max = toDate;
  document.getElementById('customDatePicker').max = toDate;
  searchDateFrom = fromDate;
  searchDateTo = toDate;

  // 默认选中昨天（如果昨天有数据的话）
  const yesterday = formatDate(new Date(now.getTime() - 24 * 60 * 60 * 1000));
  const allDates = [...new Set(newsData.map(n => n.date))].sort().reverse();
  selectedDay = allDates.includes(yesterday) ? yesterday : (allDates[0] || '');

  // 若无数据超出30天范围，自动扩展
  if (newsData.length > 0) {
    const oldest = newsData[newsData.length - 1].date;
    if (oldest < fromDate) {
      document.getElementById('newsDateFrom').value = oldest;
      searchDateFrom = oldest;
    }
  }

  // 渲染日期选择器
  renderDatePickerChips();

  renderNews();
  renderCalendar();
}

function formatDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

//  THEME TOGGLE
// ══════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('kanban-theme', next);
  applyThemeUI(next);
}

function applyThemeUI(theme) {
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (theme === 'light') {
    icon.textContent = '☀️';
    label.textContent = '浅色';
  } else {
    icon.textContent = '🌙';
    label.textContent = '深色';
  }
}

function initTheme() {
  const saved = localStorage.getItem('kanban-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  applyThemeUI(saved);
}

initTheme();
init();
