<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 游戏行业看板 - 在线版</title>
  <style>
    :root {
      --bg: #0d0f1a;
      --surface: #161929;
      --surface2: #1e2236;
      --border: #2a2f4a;
      --accent: #7c6cf8;
      --accent2: #f97316;
      --accent3: #22d3ee;
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 12px;
    }

    [data-theme="light"] {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --surface2: #edf0f7;
      --border: #dde2ee;
      --accent: #6c5ce7;
      --accent2: #e17055;
      --accent3: #0984e3;
      --green: #00b894;
      --red: #e74c3c;
      --yellow: #fdcb6e;
      --text: #1e2533;
      --text2: #5a6175;
      --text3: #9aa3b5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 22px; }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub {
      font-size: 11px; color: var(--accent3);
      background: rgba(34,211,238,0.1); border: 1px solid rgba(34,211,238,0.3);
      padding: 2px 8px; border-radius: 6px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }

    /* ── Container ── */
    .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

    /* ── Control Bar ── */
    .control-bar {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .date-nav {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .date-nav button {
      background: none; border: none; color: var(--text2);
      padding: 8px 14px; cursor: pointer; font-size: 14px;
      transition: background 0.2s;
    }
    .date-nav button:hover { background: var(--surface2); color: var(--text); }
    .date-display {
      padding: 8px 16px; font-size: 14px; font-weight: 600;
      color: var(--accent3); border-left: 1px solid var(--border);
      border-right: 1px solid var(--border); min-width: 160px;
      text-align: center; cursor: pointer; transition: background 0.2s;
    }
    .date-display:hover { background: var(--surface2); }
    .date-input-wrap { position: relative; }
    .date-input {
      position: absolute; opacity: 0; width: 160px; height: 40px; cursor: pointer;
    }
    .tab-bar {
      display: flex; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
    }
    .tab-btn {
      padding: 8px 20px; border: none; background: none; color: var(--text2);
      font-size: 13px; cursor: pointer; transition: all 0.2s;
      border-right: 1px solid var(--border);
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active { background: var(--accent); color: white; font-weight: 600; }
    .data-range {
      margin-left: auto; font-size: 12px; color: var(--text3); align-self: center;
    }

    /* ── Search Box ── */
    .search-wrap {
      position: relative;
      margin-bottom: 12px;
    }
    .search-row {
      display: flex; gap: 8px; align-items: center;
    }
    .search-input-wrap {
      position: relative; flex: 1;
    }
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 16px 9px 38px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
    }
    .search-date-wrap {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
      margin-top: 6px;
    }
    .search-date-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .search-date-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px; color: var(--text);
      font-size: 12px; outline: none; cursor: pointer;
      transition: border-color 0.2s;
    }
    .search-date-input:focus { border-color: var(--accent); }
    .search-date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    .search-results-meta {
      font-size: 11px; color: var(--text3); margin-bottom: 10px;
      padding: 0 4px;
    }
    .search-clear-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; color: var(--text2);
      font-size: 12px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .search-clear-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Stats ── */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
    }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 26px; font-weight: 700; color: var(--text); }
    .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* ── Filter Chips ── */
    .filter-section { margin-bottom: 20px; }
    .filter-row {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .filter-label { font-size: 12px; color: var(--text3); }
    .filter-chip {
      padding: 5px 14px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      color: var(--text2); transition: all 0.2s; user-select: none;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: rgba(124,108,248,0.15); border-color: var(--accent); color: var(--accent); font-weight: 600; }

    /* ── Main Layout ── */
    .main-layout {
      display: grid; grid-template-columns: 1fr 340px; gap: 20px;
    }
    @media (max-width: 960px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
    }
    .card-title { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; }
    .card-count { font-size: 11px; color: var(--text3); }

    /* ── News Grid ── */
    .news-grid { display: flex; flex-direction: column; }
    .news-item {
      display: flex; gap: 14px; padding: 14px 20px;
      border-bottom: 1px solid rgba(42,47,74,0.5);
      cursor: pointer; transition: background 0.15s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: rgba(124,108,248,0.05); }
    .news-rank {
      font-size: 20px; font-weight: 700; color: var(--text3);
      min-width: 32px; text-align: center; line-height: 1.2;
    }
    .news-rank.top1 { color: #fbbf24; }
    .news-rank.top2 { color: #94a3b8; }
    .news-rank.top3 { color: #cd7f32; }
    .news-content { flex: 1; min-width: 0; }
    .news-title {
      font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.5;
      margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .news-tag {
      font-size: 10px; padding: 1px 8px; border-radius: 10px; font-weight: 600;
    }
    .tag-手游 { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .tag-端游 { background: rgba(124,108,248,0.15); color: #a78bfa; }
    .tag-电竞 { background: rgba(34,211,238,0.15); color: #22d3ee; }
    .tag-行业 { background: rgba(52,211,153,0.15); color: #34d399; }
    .tag-IP { background: rgba(249,115,22,0.15); color: #f97316; }
    .news-source { font-size: 11px; color: var(--text3); }
    .news-hot { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--red); margin-left: auto; }
    : 1px solid rgba(34,211,238,0.25);
      border-radius: 6px; padding: 1px 8px; text-decoration: none;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }

    .news-item.search-result { gap: 10px; }
    .news-item.search-result .news-rank { font-size: 13px; min-width: auto; color: var(--text3); align-self: flex-start; }
    .news-date-badge {
      font-size: 10px; color: var(--accent3); background: rgba(34,211,238,0.1);
      border: 1px solid rgba(34,211,238,0.3); border-radius: 6px;
      padding: 1px 6px; white-space: nowrap; align-self: flex-start; margin-top: 2px;
    }

    /* ── Game Events View ── */
    #eventsView { display: none; }

    /* Calendar ── */
    .cal-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px 6px; }
    .cal-month { font-size: 13px; font-weight: 600; }
    .cal-nav-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text2);
      padding: 3px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: all 0.2s;
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px; padding: 4px 8px 8px;
    }
    .cal-weekday { text-align: center; font-size: 10px; color: var(--text3); padding: 4px; font-weight: 600; }
    .cal-day {
      min-height: 58px; display: flex; flex-direction: column;
      align-items: flex-start; justify-content: flex-start; border-radius: 8px;
      cursor: pointer; transition: all 0.15s; font-size: 11px;
      border: 1px solid transparent; padding: 5px 4px 4px;
      overflow: hidden;
    }
    .cal-day:hover { background: var(--surface2); border-color: var(--border); }
    .cal-day.other-month { opacity: 0.3; }
    .cal-day.today { border-color: var(--accent3); }
    .cal-day.has-data { background: rgba(124,108,248,0.08); }
    .cal-day-num { line-height: 1; color: var(--text2); font-size: 11px; margin-bottom: 3px; }
    .cal-day.today .cal-day-num { color: var(--accent3); font-weight: 700; }
    .cal-event-row { display: flex; align-items: center; gap: 2px; width: 100%; margin-bottom: 1px; }
    .cal-event-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .cal-event-name {
      font-size: 9px; color: var(--text2); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.3;
    }
    .cal-more { font-size: 9px; color: var(--text3); padding-left: 7px; line-height: 1.3; }
    .dot-test { background: #60a5fa; }
    .dot-release { background: var(--accent2); }
    .dot-anniversary { background: #fbbf24; }
    [data-theme="light"] .dot-test { background: #2563eb; }
    [data-theme="light"] .dot-release { background: #ea580c; }
    [data-theme="light"] .dot-anniversary { background: #d97706; }
    .cal-legend { display: flex; gap: 16px; justify-content: center; padding: 8px 12px 10px; flex-wrap: wrap; }
    .cal-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .cal-legend-pip { width: 28px; height: 8px; border-radius: 4px; }
    .pip-test { background: #60a5fa; }
    .pip-release { background: var(--accent2); }
    .pip-anniversary { background: #fbbf24; }
    [data-theme="light"] .pip-test { background: #2563eb; }
    [data-theme="light"] .pip-release { background: #ea580c; }
    [data-theme="light"] .pip-anniversary { background: #d97706; }

    /* ── Event Groups ── */
    .event-groups { padding: 0; }
    .event-group { border-bottom: 1px solid rgba(42,47,74,0.5); }
    .event-group:last-child { border-bottom: none; }
    .event-group-header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; cursor: pointer;
      background: rgba(0,0,0,0.15);
      transition: background 0.15s;
    }
    .event-group-header:hover { background: rgba(124,108,248,0.06); }
    .event-group-icon { font-size: 16px; }
    .event-group-title { font-size: 13px; font-weight: 600; }
    .event-group-count { font-size: 11px; color: var(--text3); margin-left: auto; padding-right: 4px; }
    .event-group-toggle { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
    .event-group-toggle.open { transform: rotate(180deg); }
    .event-group-items { display: none; }
    .event-group-items.open { display: block; }
    .event-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px 10px 32px;
      border-bottom: 1px solid rgba(42,47,74,0.3);
      cursor: pointer; transition: background 0.15s;
    }
    .event-item:last-child { border-bottom: none; }
    .event-item:hover { background: rgba(124,108,248,0.04); }
    .event-badge {
      width: 26px; height: 26px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
    }
    .badge-test { background: rgba(96,165,250,0.15); color: #60a5fa; }
    .badge-release { background: rgba(249,115,22,0.15); color: var(--accent2); }
    .badge-update { background: rgba(52,211,153,0.15); color: var(--green); }
    .event-info { flex: 1; min-width: 0; }
    .event-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta { font-size: 11px; color: var(--text3); }
    .event-date { font-size: 11px; color: var(--accent3); font-weight: 600; white-space: nowrap; }

    /* ── Events Stats Bar ── */
    .events-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 16px;
    }
    .event-stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .event-stat-card:hover { border-color: var(--accent); }
    .event-stat-card.active { border-color: var(--accent); background: rgba(124,108,248,0.08); }
    [data-theme="light"] .event-stat-card.active { background: rgba(108,92,231,0.07); }
    .event-stat-icon { font-size: 18px; margin-bottom: 4px; }
    .event-stat-label { font-size: 11px; color: var(--text3); margin-bottom: 2px; }
    .event-stat-value { font-size: 22px; font-weight: 700; color: var(--text); }

    /* ── Empty State ── */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
    .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* ── Loading ── */
    .loading-state { display: flex; align-items: center; justify-content: center; padding: 48px; gap: 10px; color: var(--text3); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      z-index: 200; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; max-width: 580px; width: 100%; max-height: 80vh;
      overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 15px; font-weight: 600; }
    .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 22px; transition: color 0.2s; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 20px 24px; }
    .modal-news-title { font-size: 17px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; }
    .modal-news-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-news-content { font-size: 14px; line-height: 1.8; color: var(--text2); }
    .modal-game-row { display: flex; padding: 10px 0; border-bottom: 1px solid rgba(42,47,74,0.5); font-size: 14px; align-items: center; }
    .modal-game-row:last-child { border-bottom: none; }
    .modal-game-label { color: var(--text3); width: 80px; flex-shrink: 0; }
    .modal-game-value { color: var(--text); }
    .modal-game-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent3); text-decoration: none; padding: 2px 8px; border-radius: 6px; background: rgba(34,211,238,0.08); border: 1px solid rgba(34,211,238,0.2); margin-right: 6px; transition: all 0.15s; }
    .modal-game-link:hover { background: rgba(34,211,238,0.15); border-color: var(--accent3); }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px; font-size: 13px;
      z-index: 300; display: none; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { display: block; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Page Footer ── */
    .page-footer {
      text-align: center;
      padding: 16px 20px;
      font-size: 11px;
      line-height: 1.8;
      color: var(--text3);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-left">
    <span class="header-logo">🎮</span>
    <span class="header-title">游戏行业看板</span>
    <span class="header-sub">在线版</span>
  </div>
  <div class="header-right">
    <span id="lastUpdated" style="font-size:12px;color:var(--text3)"></span>
    <button id="themeToggle" onclick="toggleTheme()" title="切换主题" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text2);transition:all 0.2s;">
      <span id="themeIcon">🌙</span>
      <span id="themeLabel" style="font-size:11px;">深色</span>
    </button>
  </div>
</header>

<div class="container">

  <!-- Control Bar -->
  <div class="control-bar">
    <div id="dateNavBar">
      <div class="date-nav">
        <button onclick="changeDate(-1)" title="前一天">◀</button>
        <div class="date-display" id="dateDisplay" onclick="document.getElementById('dateInput').click()">
          <span id="dateLabel">加载中…</span>
        </div>
        <button onclick="changeDate(1)" title="后一天">▶</button>
      </div>
      <div class="date-input-wrap">
        <input type="date" id="dateInput" class="date-input" onchange="selectDate(this.value)">
      </div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" id="tabDaily" onclick="switchTab('daily', this)">📰 游戏新闻日报</button>
      <button class="tab-btn" id="tabEvents" onclick="switchTab('events', this)">🎮 游戏大事件</button>
    </div>
    <div class="data-range" id="dataRange"></div>
  </div>

  <!-- ════════════════════════════════════════ -->
  <!--  DAILY VIEW (日报)                       -->
  <!-- ════════════════════════════════════════ -->
  <div id="dailyPanel">

    <!-- Search Box -->
    <div class="search-wrap">
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="搜索全部365天内的热点新闻…"
            autocomplete="off"
          />
        </div>
        <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" style="display:none">清除搜索</button>
      </div>
      <div class="search-date-wrap">
        <span class="search-date-label">时间范围</span>
        <input type="date" class="search-date-input" id="searchDateFrom" onchange="onSearchDateChange()" />
        <span class="search-date-label">至</span>
        <input type="date" class="search-date-input" id="searchDateTo" onchange="onSearchDateChange()" />
      </div>
    </div>

    <!-- Stats -->
    <div class="stats" id="stats"></div>

    <!-- Category Filters -->
    <div class="filter-section">
      <div class="filter-row" id="catFilters"></div>
    </div>

    <!-- News List -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span>📰</span>
          <span id="newsListTitle">热点新闻</span>
        </div>
        <span class="card-count" id="newsCount"></span>
      </div>
      <div id="newsList" class="news-grid">
        <div class="loading-state"><div class="spinner"></div>加载数据…</div>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════ -->
  <!--  EVENTS VIEW (游戏大事件)                -->
  <!-- ════════════════════════════════════════ -->
  <div id="eventsView">

    <!-- Quick Stats: 3 group totals -->
    <div class="events-stats" id="eventsStats"></div>

    <!-- Calendar -->
    <div class="card" style="margin-bottom: 16px;">
      <div class="card-header">
        <div class="card-title">📅 大事件日历</div>
      </div>
      <div class="cal-header">
        <button class="cal-nav-btn" onclick="changeCalMonth(-1)">◀</button>
        <span class="cal-month" id="calMonthLabel"></span>
        <button class="cal-nav-btn" onclick="changeCalMonth(1)">▶</button>
      </div>
      <div class="cal-grid" id="calendarGrid"></div>
      <div class="cal-legend">
        <div class="cal-legend-item"><div class="cal-legend-pip pip-test"></div>🧪 测试</div>
        <div class="cal-legend-item"><div class="cal-legend-pip pip-release"></div>📦 公测上线</div>
        <div class="cal-legend-item"><div class="cal-legend-pip pip-anniversary"></div>🎉 周年庆</div>
      </div>
    </div>

    <!-- Grouped Event List -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span>📋</span>
          <span id="eventsListTitle">大事件列表</span>
        </div>
        <span class="card-count" id="eventsCount"></span>
      </div>
      <div id="eventGroups" class="event-groups">
        <div class="loading-state"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">详情</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════
const allData = {};            // date -> { date, dayLabel, news[] }
const availableDates = [];     // sorted list of available date strings
let currentDate = '';          // 'YYYY-MM-DD'
let currentFilter = 'all';     // 'all' | category string
let currentView = 'daily';     // 'daily' | 'events'
let currentCalMonth = 0;       // offset from current month
let currentEventFilter = 'all'; // 'all' | 'test' | 'release' | 'update'
let allGames = [];             // 全局游戏大事件数据（从 data/games.json 加载）
let searchQuery = '';          // 当前搜索关键词
let searchIndex = [];          // [{ date, dayLabel, ...news }]
let searchDebounceTimer = null;
let searchDateFrom = '';       // 搜索起始日期
let searchDateTo = '';         // 搜索截止日期

// ════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════
async function init() {
  await loadAllData();
  await loadGamesData();
  buildSearchIndex();
  const today = new Date();
  const todayStr = formatDate(today);

  // 设置搜索日期筛选器（全部365天）
  const yearAgo = new Date(today);
  yearAgo.setFullYear(today.getFullYear() - 1);
  const fromStr = formatDate(yearAgo);
  document.getElementById('searchDateFrom').value = fromStr;
  document.getElementById('searchDateFrom').max = todayStr;
  document.getElementById('searchDateTo').value = todayStr;
  document.getElementById('searchDateTo').max = todayStr;
  searchDateFrom = fromStr;
  searchDateTo = todayStr;

  currentDate = availableDates.includes(todayStr) ? todayStr : availableDates[availableDates.length - 1];
  currentCalMonth = 0;

  // 绑定搜索事件
  document.getElementById('searchInput').addEventListener('input', onSearchInput);

  renderAll();
  document.getElementById('dateInput').max = todayStr;
}

// ════════════════════════════════════════════════════
//  DATA LOADING
// ════════════════════════════════════════════════════
async function loadAllData() {
  try {
    const todayStr = formatDate(new Date());
    await loadDateFile(todayStr);
    const response = await fetch('data/daily/');
    if (response.ok) {
      const text = await response.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      const links = doc.querySelectorAll('a');
      for (const link of links) {
        const href = link.getAttribute('href');
        if (href && href.match(/^\d{4}-\d{2}-\d{2}\.json$/)) {
          await loadDateFile(href.replace('.json', ''));
        }
      }
    }
  } catch (e) {
    // fallback: 尝试最近60天
    const today = new Date();
    for (let i = 0; i < 60; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      await loadDateFile(formatDate(d));
    }
  }
}

async function loadDateFile(dateStr) {
  if (allData[dateStr]) return;
  try {
    const response = await fetch(`data/daily/${dateStr}.json?t=${Date.now()}`);
    if (response.ok) {
      const data = await response.json();
      allData[dateStr] = data;
      if (!availableDates.includes(dateStr)) {
        availableDates.push(dateStr);
      }
    }
  } catch (e) { /* silently fail */ }
}

async function loadGamesData() {
  try {
    const response = await fetch('data/games.json?t=' + Date.now());
    if (response.ok) {
      allGames = await response.json();
    }
  } catch (e) {
    allGames = [];
  }
}

// ════════════════════════════════════════════════════
//  SEARCH INDEX
// ════════════════════════════════════════════════════
function buildSearchIndex() {
  searchIndex = [];
  for (const dateStr in allData) {
    const day = allData[dateStr];
    for (const news of (day.news || [])) {
      searchIndex.push({ date: dateStr, dayLabel: day.dayLabel, ...news });
    }
  }
}

function onSearchInput(e) {
  searchQuery = e.target.value.trim();
  document.getElementById('searchClearBtn').style.display = searchQuery ? 'inline-flex' : 'none';
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(() => {
    renderNewsList();
  }, 200);
}

function performSearch(query) {
  if (!query) return [];
  const q = query.toLowerCase();
  return searchIndex.filter(item => {
    // ✅ 只匹配标题，不匹配来源/厂商/正文
    const matchTitle = item.title.toLowerCase().includes(q);
    const matchDate =
      (!searchDateFrom || item.date >= searchDateFrom) &&
      (!searchDateTo   || item.date <= searchDateTo);
    return matchTitle && matchDate;
  });
}

function onSearchDateChange() {
  searchDateFrom = document.getElementById('searchDateFrom').value;
  searchDateTo = document.getElementById('searchDateTo').value;
  renderNewsList();
}

function clearSearch() {
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  // 重置日期范围
  const today = new Date();
  const thirtyDaysAgo = new Date(today);
  thirtyDaysAgo.setDate(today.getDate() - 30);
  const todayStr = formatDate(today);
  const fromStr = formatDate(thirtyDaysAgo);
  document.getElementById('searchDateFrom').value = fromStr;
  document.getElementById('searchDateTo').value = todayStr;
  searchDateFrom = fromStr;
  searchDateTo = todayStr;
  document.getElementById('searchClearBtn').style.display = 'none';
  renderNewsList();
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function renderAll() {
  renderDateDisplay();
  renderStats();
  renderCatFilters();
  renderNewsList();
  renderCalendar();
  renderEventsStats();
  renderEventGroups();
  renderDataRange();
}

function renderDateDisplay() {
  const data = allData[currentDate];
  const label = data ? data.dayLabel : currentDate;
  document.getElementById('dateLabel').textContent = label;
  document.getElementById('dateInput').value = currentDate;
}

function renderStats() {
  const data = allData[currentDate];
  const statsEl = document.getElementById('stats');
  if (!data) {
    statsEl.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>暂无数据</p></div>';
    return;
  }
  const news = data.news || [];
  const cats = ['手游', '端游', '电竞', '行业', 'IP'];
  const catCounts = {};
  cats.forEach(c => catCounts[c] = news.filter(n => n.cat === c).length);

  statsEl.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">手游相关</div>
      <div class="stat-value">${catCounts['手游']}</div>
      <div class="stat-sub">条</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">电竞相关</div>
      <div class="stat-value">${catCounts['电竞']}</div>
      <div class="stat-sub">条</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">行业相关</div>
      <div class="stat-value">${catCounts['行业']}</div>
      <div class="stat-sub">条</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">端游</div>
      <div class="stat-value">${catCounts['端游']}</div>
      <div class="stat-sub">条</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">IP</div>
      <div class="stat-value">${catCounts['IP']}</div>
      <div class="stat-sub">条</div>
    </div>
  `;
}

function renderCatFilters() {
  const cats = ['all', '手游', '端游', '电竞', '行业', 'IP'];
  const labels = { all: '全部', 手游: '🎮 手游', 端游: '🖥️ 端游', 电竞: '🏆 电竞', 行业: '📊 行业', IP: '🎬 IP' };

  document.getElementById('catFilters').innerHTML = cats.map(c => `
    <div class="filter-chip ${currentFilter === c ? 'active' : ''}"
         onclick="setCatFilter('${c}')">${labels[c]}</div>
  `).join('');
}

function renderNewsList() {
  const panel = document.getElementById('dailyPanel');
  const view = document.getElementById('eventsView');
  const newsList = document.getElementById('newsList');

  if (currentView === 'events') {
    panel.style.display = 'none';
    view.style.display = 'block';
    return;
  }

  panel.style.display = 'block';
  view.style.display = 'none';

  // ── 搜索模式 ──
  if (searchQuery) {
    const results = performSearch(searchQuery);
    let items = results;
    if (currentFilter !== 'all') {
      items = items.filter(n => n.cat === currentFilter);
    }
    document.getElementById('newsCount').textContent = `${items.length}条`;
    document.getElementById('newsListTitle').textContent = `🔍 搜索结果：${searchQuery}`;
    if (items.length === 0) {
      newsList.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>没有找到相关内容</p></div>';
      return;
    }
    newsList.innerHTML = items.map(news => {
      const rankClass = news.rank === 1 ? 'top1' : news.rank === 2 ? 'top2' : news.rank === 3 ? 'top3' : '';
      return `
        <div class="news-item search-result" onclick="showNewsModal('${news.rank}', '${news.date}')">
          <div class="news-rank ${rankClass}">${news.rank}</div>
          <div class="news-content">
            <div class="news-title">${escHtml(news.title)}</div>
            <div class="news-meta">
              <span class="news-tag tag-${news.cat}">${news.cat}</span>
              <span class="news-source">${escHtml(news.source)}</span>
              <span class="news-hot">🔥 ${escHtml(news.hot)}</span>
            </div>
          </div>
          <div class="news-date-badge">${news.date}</div>
        </div>
      `;
    }).join('');
    return;
  }

  // ── 日报模式 ──
  const data = allData[currentDate];
  if (!data) {
    newsList.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>暂无该日数据</p></div>';
    document.getElementById('newsListTitle').textContent = '热点新闻';
    return;
  }

  let items = data.news || [];
  if (currentFilter !== 'all') {
    items = items.filter(n => n.cat === currentFilter);
  }

  document.getElementById('newsCount').textContent = `${items.length}条`;
  document.getElementById('newsListTitle').textContent = '热点新闻';

  if (items.length === 0) {
    newsList.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><p>没有符合条件的新闻</p></div>';
    return;
  }

  newsList.innerHTML = items.map(news => {
    const rankClass = news.rank === 1 ? 'top1' : news.rank === 2 ? 'top2' : news.rank === 3 ? 'top3' : '';
    return `
      <div class="news-item" onclick="showNewsModal('${news.rank}', '${currentDate}')">
        <div class="news-rank ${rankClass}">${news.rank}</div>
        <div class="news-content">
          <div class="news-title">${escHtml(news.title)}</div>
          <div class="news-meta">
            <span class="news-tag tag-${news.cat}">${news.cat}</span>
            <span class="news-source">${escHtml(news.source)}</span>
            <span class="news-source">· ${escHtml(news.company)}</span>
            <span class="news-hot">🔥 ${escHtml(news.hot)}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ─── Events View ───────────────────────────────────
function renderEventsStats() {
  const statsEl = document.getElementById('eventsStats');
  const testCount = allGames.filter(g => g.eventType === 'test').length;
  const releaseCount = allGames.filter(g => g.eventType === 'release').length;
  const annivCount = allGames.filter(g => g.eventType === 'anniversary').length;

  const groups = [
    { type: 'test', icon: '🧪', label: '测试', count: testCount },
    { type: 'release', icon: '🚀', label: '公测上线', count: releaseCount },
    { type: 'anniversary', icon: '🎉', label: '周年庆', count: annivCount },
  ];

  statsEl.innerHTML = groups.map(g => `
    <div class="event-stat-card ${currentEventFilter === g.type ? 'active' : ''}"
         onclick="setEventFilter('${g.type}')">
      <div class="event-stat-icon">${g.icon}</div>
      <div class="event-stat-label">${g.label}</div>
      <div class="event-stat-value">${g.count}</div>
    </div>
  `).join('');
}

function renderEventGroups() {
  const container = document.getElementById('eventGroups');

  // 基于 allGames（全局唯一）过滤
  let games = [...allGames];
  if (currentEventFilter !== 'all') {
    games = games.filter(g => g.eventType === currentEventFilter);
  }

  // 按日期排序
  games.sort((a, b) => new Date(a.date) - new Date(b.date));

  document.getElementById('eventsCount').textContent = `${games.length}项`;
  document.getElementById('eventsListTitle').textContent =
    currentEventFilter === 'all' ? '全部大事件' :
    currentEventFilter === 'test' ? '🧪 测试' :
    currentEventFilter === 'anniversary' ? '🎉 周年庆' : '🚀 公测上线';

  if (games.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📭</div><p>暂无大事件</p></div>';
    return;
  }

  const groups = [
    { type: 'test', icon: '🧪', label: '测试', title: '🧪 测试' },
    { type: 'release', icon: '🚀', label: '公测上线', title: '🚀 公测上线' },
    { type: 'anniversary', icon: '🎉', label: '周年庆', title: '🎉 周年庆' },
  ];

  container.innerHTML = groups.map(g => {
    const groupGames = games.filter(gg => gg.eventType === g.type);
    if (groupGames.length === 0) return '';
    return `
      <div class="event-group">
        <div class="event-group-header" onclick="toggleEventGroup('${g.type}')">
          <span class="event-group-icon">${g.icon}</span>
          <span class="event-group-title">${g.title}</span>
          <span class="event-group-count">${groupGames.length}项</span>
          <span class="event-group-toggle" id="toggle-${g.type}">▼</span>
        </div>
        <div class="event-group-items open" id="group-${g.type}">
          ${groupGames.map(game => `
            <div class="event-item" onclick="showGameModal('${game.name}')">
              <div class="event-badge badge-${game.eventType}">
                ${game.eventType === 'test' ? '测' : '公'}
              </div>
              <div class="event-info">
                <div class="event-name">${escHtml(game.name)}</div>
                <div class="event-meta">${escHtml(game.company)} · ${escHtml(game.platform)}</div>
              </div>
              <div class="event-date">${game.date.slice(5).replace('-','/')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function toggleEventGroup(type) {
  const items = document.getElementById(`group-${type}`);
  const toggle = document.getElementById(`toggle-${type}`);
  items.classList.toggle('open');
  toggle.classList.toggle('open');
}

// ─── Calendar ──────────────────────────────────────
function renderCalendar() {
  const today = new Date();
  const calDate = new Date(today.getFullYear(), today.getMonth() + currentCalMonth, 1);

  document.getElementById('calMonthLabel').textContent =
    `${calDate.getFullYear()}年${calDate.getMonth() + 1}月`;

  const grid = document.getElementById('calendarGrid');
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = formatDate(today);

// 按日期分组全局游戏数据（仅测试+公测，去掉版本更新）
  const dateGames = {};
  for (const g of allGames) {
    if (g.eventType === 'update') continue;
    if (!dateGames[g.date

  let html = ['日','一','二','三','四','五','六'].map(d => `<div class="cal-weekday">${d}</div>`).join('');

  for (let i = 0; i < firstDow; i++) {
    const prevDate = new Date(year, month, -firstDow + i + 1);
    const prevStr = formatDate(prevDate);
    const prevGames = dateGames[prevStr] || [];
    const prevRows = prevGames.slice(0,2).map(g => {
      const dotCls = g.eventType === 'test' ? 'dot-test' : g.eventType === 'anniversary' ? 'dot-anniversary' : 'dot-release';
      const shortName = g.name.length > 6 ? g.name.slice(0,6)+'…' : g.name;
      return `<div class="cal-event-row"><div class="cal-event-dot ${dotCls}"></div><div class="cal-event-name">${shortName}</div></div>`;
    }).join('');
    html += `<div class="cal-day other-month" onclick="showCalDayModal('${prevStr}')">
      <div class="cal-day-num">${prevDate.getDate()}</div>
      ${prevGames.length ? prevRows : ''}
    </div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const games = dateGames[dateStr] || [];
    const hasData = games.length > 0;

    const MAX_SHOW = 3;
    const shown = games.slice(0, MAX_SHOW);
    const extra = games.length - MAX_SHOW;
    const eventRows = shown.map(g => {
      const dotCls = g.eventType === 'test' ? 'dot-test' : g.eventType === 'anniversary' ? 'dot-anniversary' : 'dot-release';
      const shortName = g.name.length > 7 ? g.name.slice(0, 7) + '…' : g.name;
      return `<div class="cal-event-row"><div class="cal-event-dot ${dotCls}"></div><div class="cal-event-name" title="${escHtml(g.name)}">${shortName}</div></div>`;
    }).join('');
    const moreRow = extra > 0 ? `<div class="cal-more">+${extra}更多</div>` : '';

    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (hasData) cls += ' has-data';

    html += `<div class="${cls}" onclick="showCalDayModal('${dateStr}')" title="${games.map(g=>g.name+'('+g.eventType+')').join(', ')}">
      <div class="cal-day-num">${d}</div>
      ${hasData ? eventRows + moreRow : ''}
    </div>`;
  }

  const totalCells = firstDow + daysInMonth;
  const remainder = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 0; i < remainder; i++) {
    const nextDate = new Date(year, month + 1, i + 1);
    const nextStr = formatDate(nextDate);
    const nextGames = dateGames[nextStr] || [];
    const nextRows = nextGames.slice(0,2).map(g => {
      const dotCls = g.eventType === 'test' ? 'dot-test' : g.eventType === 'anniversary' ? 'dot-anniversary' : 'dot-release';
      const shortName = g.name.length > 6 ? g.name.slice(0,6)+'…' : g.name;
      return `<div class="cal-event-row"><div class="cal-event-dot ${dotCls}"></div><div class="cal-event-name">${shortName}</div></div>`;
    }).join('');
    html += `<div class="cal-day other-month" onclick="showCalDayModal('${nextStr}')">
      <div class="cal-day-num">${i + 1}</div>
      ${nextGames.length ? nextRows : ''}
    </div>`;
  }

  grid.innerHTML = html;
}

function renderDataRange() {
  if (availableDates.length === 0) return;
  const sorted = availableDates.sort();
  const earliest = sorted[0];
  const latest = sorted[sorted.length - 1];
  document.getElementById('dataRange').textContent =
    `数据范围：${earliest} ~ ${latest}（${sorted.length}天）`;
  document.getElementById('lastUpdated').textContent =
    `已加载 ${sorted.length} 天数据`;
}

// ════════════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════════════
async function changeDate(delta) {
  const idx = availableDates.indexOf(currentDate);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= availableDates.length) {
    showToast('已达数据边界');
    return;
  }
  currentDate = availableDates[newIdx];
  if (!allData[currentDate]) {
    await loadDateFile(currentDate);
  }
  // 切换日期时清空搜索
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderAll();
}

async function selectDate(dateStr) {
  if (!dateStr) return;
  if (!availableDates.includes(dateStr)) {
    await loadDateFile(dateStr);
    if (!allData[dateStr]) {
      showToast(`暂无 ${dateStr} 的数据`);
      return;
    }
    availableDates.push(dateStr);
    availableDates.sort();
  }
  currentDate = dateStr;
  // 切换日期时清空搜索
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderAll();
}

async function jumpToDate(dateStr) {
  if (!availableDates.includes(dateStr)) {
    await loadDateFile(dateStr);
    if (!allData[dateStr]) {
      showToast('暂无该日期数据');
      return;
    }
    availableDates.push(dateStr);
    availableDates.sort();
  }
  currentDate = dateStr;
  // 跳转时清空搜索
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  currentView = 'daily';
  document.getElementById('tabDaily').classList.add('active');
  document.getElementById('tabEvents').classList.remove('active');
  renderAll();
}

function changeCalMonth(delta) {
  currentCalMonth += delta;
  renderCalendar();
}

function setCatFilter(cat) {
  currentFilter = cat;
  renderCatFilters();
  renderNewsList();
}

function setEventFilter(type) {
  currentEventFilter = type;
  renderEventsStats();
  renderEventGroups();
}

function switchTab(view, btn) {
  currentView = view;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const dateNavBar = document.getElementById('dateNavBar');
  if (view === 'events') {
    dateNavBar.style.display = 'none';
    renderNewsList();
    renderEventsStats();
    renderEventGroups();
    renderCalendar();
  } else {
    dateNavBar.style.display = 'flex';
    renderNewsList();
  }
}

function showNewsModal(rank, date) {
  const data = allData[date];
  if (!data) return;
  const news = data.news.find(n => String(n.rank) === String(rank));
  if (!news) return;

  document.getElementById('modalTitle').textContent = `第${news.rank}条 · ${data.dayLabel}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-news-title">${escHtml(news.title)}</div>
    <div class="modal-news-meta">
      <span class="news-tag tag-${news.cat}">${news.cat}</span>
      <span class="news-source">${escHtml(news.source)}</span>
      <span class="news-source">· ${escHtml(news.company)}</span>
      <span class="news-hot">🔥 ${escHtml(news.hot)}</span>
    </div>
    <div class="modal-news-content">${escHtml(news.detail)}</div>
  `;
  document.getElementById('modal').classList.add('active');
}

function showGameModal(gameName) {
  const game = allGames.find(g => g.name === gameName);
  if (!game) return;

  const typeLabel = { test: '测试', release: '公测上线' };
  const typeColor = { test: '#60a5fa', release: 'var(--accent2)' };

  // 链接按钮
  const links = [];
  if (game.website) {
    links.push(`<a href="${escHtml(game.website)}" target="_blank" rel="noopener" class="modal-game-link">🌐 官网</a>`);
  }
  if (game.bilibili) {
    links.push(`<a href="${escHtml(game.bilibili)}" target="_blank" rel="noopener" class="modal-game-link">📺 B站游戏中心</a>`);
  }
  const linksHtml = links.length > 0
    ? `<div class="modal-game-row" style="border-bottom:none;padding-bottom:0">
         <div class="modal-game-label">相关链接</div>
         <div style="display:flex;gap:6px;flex-wrap:wrap">${links.join('')}</div>
       </div>`
    : '';

  document.getElementById('modalTitle').textContent = `🎮 ${game.name}`;
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-game-row">
      <div class="modal-game-label">日期</div>
      <div class="modal-game-value" style="color:var(--accent3);font-weight:600">${game.date}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">事件类型</div>
      <div class="modal-game-value" style="color:${typeColor[game.eventType] || 'var(--text)'}">${typeLabel[game.eventType] || game.eventType}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">厂商</div>
      <div class="modal-game-value">${escHtml(game.company)}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">平台</div>
      <div class="modal-game-value">${escHtml(game.platform)}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">类型</div>
      <div class="modal-game-value">${escHtml(game.type)}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">备注</div>
      <div class="modal-game-value">${escHtml(game.note)}</div>
    </div>
    ${linksHtml}
  `;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

// 日历点击当天事件弹窗
function showCalDayModal(dateStr) {
  const games = allGames.filter(g => g.date === dateStr && g.eventType !== 'update');
  if (games.length === 0) {
    showToast('该日无事件');
    return;
  }

  const typeLabel = { test: '测试', release: '公测上线', anniversary: '周年庆' };
  const typeColor = { test: '#60a5fa', release: 'var(--accent2)', anniversary: '#fbbf24' };

  const rows = games.map(g => `
    <div class="modal-game-row">
      <div class="modal-game-label">${typeLabel[g.eventType] || g.eventType}</div>
      <div class="modal-game-value" style="font-weight:600">${escHtml(g.name)}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">厂商</div>
      <div class="modal-game-value">${escHtml(g.company)}</div>
    </div>
    <div class="modal-game-row">
      <div class="modal-game-label">平台</div>
      <div class="modal-game-value">${escHtml(g.platform)}</div>
    </div>
    <div class="modal-game-row" style="border-bottom:2px solid var(--border)">
      <div class="modal-game-label">类型</div>
      <div class="modal-game-value">${escHtml(g.type)}</div>
    </div>
  `).join('');

  document.getElementById('modalTitle').textContent = `📅 ${dateStr} 游戏事件`;
  document.getElementById('modalBody').innerHTML = rows;
  document.getElementById('modal').classList.add('active');
}

// ════════════════════════════════════════════════════
//  UTILITIES
// ════════════════════════════════════════════════════
function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (currentView === 'daily' && document.activeElement !== document.getElementById('searchInput')) {
    if (e.key === 'ArrowLeft') changeDate(-1);
    if (e.key === 'ArrowRight') changeDate(1);
  }
  if (e.key === 'Escape') closeModal();
});

// ════════════════════════════════════════════════════
//  THEME TOGGLE
// ════════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('kanban-theme', next);
  applyThemeUI(next);
}

function applyThemeUI(theme) {
  const icon = document.getElementById('themeIcon');
  const label = document.getElementById('themeLabel');
  if (theme === 'light') {
    icon.textContent = '☀️';
    label.textContent = '浅色';
  } else {
    icon.textContent = '🌙';
    label.textContent = '深色';
  }
}

function initTheme() {
  const saved = localStorage.getItem('kanban-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  applyThemeUI(saved);
}

// ════════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════════
initTheme();
init();
</script>
