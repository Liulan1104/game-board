name: 🎮 游戏行业看板 - 每日自动更新

on:
  schedule:
    # 每天早上 9 点（北京时间）自动执行
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '指定日期 (YYYY-MM-DD)，留空则自动抓取昨天'
        required: false
        type: string

jobs:
  collect-daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml -q

      - name: Scrape and update data
        id: scrape
        run: |
          python3 << 'EOF'
          import os
          import json
          import requests
          from datetime import datetime, timedelta

          HEADERS = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Accept': 'application/json, text/plain, */*',
              'Accept-Language': 'zh-CN,zh;q=0.9',
          }

          # ── 目标日期（默认抓取昨天，因为9:00时当天新闻尚未完整）──
          target_date = os.environ.get('TARGET_DATE', '')
          if not target_date:
              target_date = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')
          print(f"📅 目标日期: {target_date}")

          # ── 游戏关键词大全（用于微博/抖音等非垂类平台过滤）──
          GAME_KEYWORDS = [
              # 知名游戏
              '游戏','原神','崩铁','崩坏','王者荣耀','王者世界','鸣潮','绝区零','方舟','明日方舟',
              'LOL','英雄联盟','三角洲','和平精英','PUBG','蛋仔','元梦','永劫无间','逆水寒',
              '金铲铲','云顶','星穹铁道','星铁','米哈游','鹰角','库洛','完美世界',
              '暗区突围','黑神话','悟空','剑与远征','召唤之海','白夜极光','少女前线',
              '碧蓝航线','碧蓝幻想','阴阳师','第五人格','光遇','光与夜之恋','恋与深空',
              '重返未来','无限暖暖','无限世界','幻塔','《幻塔》','深空之眼','海角',
              # 平台/公司
              'Steam','网易游戏','腾讯游戏','bilibili游戏','B站游戏','IGN','TapTap',
              'Genshin','Honkai','ZZZ','MiHoYo','HoYoverse','CAPCOM','卡普空',
              # 电竞
              'LPL','LCK','KPL','VCT','CFTL','S14','英雄联盟赛事','王者赛事','电竞',
              # 通用游戏词
              '版本更新','公测','内测','删档','首测','开服','上线','联动','周年庆',
              '新角色','新干员','新英雄','限定','UP池','抽卡','限时','赛季',
          ]

          # ═══════════════════════════════════════════════════════
          # 来源1：B站热搜（替代原来的B站综合热门）
          # ═══════════════════════════════════════════════════════
          bilibili_topics = []
          try:
              r = requests.get('https://tenapi.cn/v2/bilihot', timeout=10, headers=HEADERS)
              if r.status_code == 200:
                  data = r.json()
                  if data.get('code') == 200 and data.get('data'):
                      for item in data['data'][:30]:
                          word = item.get('name', '').strip()
                          if any(k in word for k in GAME_KEYWORDS):
                              hot_val = item.get('hot', 0)
                              hot_str = f'{int(hot_val)//10000}万热度' if hot_val and int(hot_val) > 9999 else str(hot_val)
                              bilibili_topics.append({
                                  'rank': 0,
                                  'cat': '行业',
                                  'title': word,
                                  'source': 'B站热搜',
                                  'company': '',
                                  'hot': hot_str,
                                  'detail': word,
                                  'url': item.get('url', f'https://search.bilibili.com/all?vt=1&keyword={word}')
                              })
                      print(f"✅ B站热搜 游戏相关 {len(bilibili_topics)} 条")
          except Exception as e:
              print(f"⚠️ B站热搜抓取失败: {e}")

          # ═══════════════════════════════════════════════════════
          # 来源2：微博热搜（保留）
          # ═══════════════════════════════════════════════════════
          weibo_topics = []
          try:
              r = requests.get(
                  'https://weibo.com/ajax/side/hotSearch',
                  timeout=10,
                  headers={**HEADERS, 'Referer': 'https://weibo.com'}
              )
              if r.status_code == 200:
                  items = r.json().get('data', {}).get('realtime', [])
                  print(f"微博热搜 获取 {len(items)} 条原始数据")
                  matched = 0
                  for item in items[:50]:
                      word = item.get('word', '').strip()
                      note = item.get('note', '') or ''
                      combined = word + note
                      if any(k in combined for k in GAME_KEYWORDS):
                          matched += 1
                          hot_num = item.get('num', 0)
                          hot_str = f'{hot_num//10000}万热度' if hot_num >= 10000 else f'热搜中'
                          weibo_topics.append({
                              'rank': 0,
                              'cat': '行业',
                              'title': word,
                              'source': '微博热搜',
                              'company': '',
                              'hot': hot_str,
                              'detail': note if note else word,
                              'url': f'https://s.weibo.com/weibo?q={word}'
                          })
                  print(f"✅ 微博热搜 游戏相关 {matched} 条")
          except Exception as e:
              print(f"⚠️ 微博热搜抓取失败: {e}")

          # ═══════════════════════════════════════════════════════
          # 来源3：抖音热榜（过滤游戏关键词）
          # ═══════════════════════════════════════════════════════
          douyin_topics = []
          try:
              r = requests.get('https://tenapi.cn/v2/douyinhot', timeout=10, headers=HEADERS)
              if r.status_code == 200:
                  data = r.json()
                  if data.get('code') == 200 and data.get('data'):
                      for item in data['data'][:50]:
                          word = item.get('name', '').strip()
                          if any(k in word for k in GAME_KEYWORDS):
                              hot_val = item.get('hot', 0)
                              hot_str = f'{int(hot_val)//10000}万热度' if hot_val and int(hot_val) > 9999 else str(hot_val)
                              douyin_topics.append({
                                  'rank': 0,
                                  'cat': '手游',
                                  'title': word,
                                  'source': '抖音热搜',
                                  'company': '',
                                  'hot': hot_str,
                                  'detail': word,
                                  'url': item.get('url', f'https://www.douyin.com/search/{word}')
                              })
                      print(f"✅ 抖音热搜 游戏相关 {len(douyin_topics)} 条")
          except Exception as e:
              print(f"⚠️ 抖音热搜抓取失败: {e}")

          # ═══════════════════════════════════════════════════════
          # 来源4：知乎热榜（过滤游戏关键词）
          # ═══════════════════════════════════════════════════════
          zhihu_topics = []
          try:
              r = requests.get('https://tenapi.cn/v2/zhihuhot', timeout=10, headers=HEADERS)
              if r.status_code == 200:
                  data = r.json()
                  if data.get('code') == 200 and data.get('data'):
                      for item in data['data'][:30]:
                          word = item.get('name', '').strip()
                          if any(k in word for k in GAME_KEYWORDS):
                              hot_str = item.get('hot', '')
                              zhihu_topics.append({
                                  'rank': 0,
                                  'cat': '行业',
                                  'title': word,
                                  'source': '知乎热榜',
                                  'company': '',
                                  'hot': hot_str,
                                  'detail': word,
                                  'url': item.get('url', f'https://www.zhihu.com/search?q={word}')
                              })
                      print(f"✅ 知乎热榜 游戏相关 {len(zhihu_topics)} 条")
          except Exception as e:
              print(f"⚠️ 知乎热榜抓取失败: {e}")

          # ═══════════════════════════════════════════════════════
          # 来源5：今日头条热榜（过滤游戏关键词）
          # ═══════════════════════════════════════════════════════
          toutiao_topics = []
          try:
              r = requests.get('https://tenapi.cn/v2/toutiaohot', timeout=10, headers=HEADERS)
              if r.status_code == 200:
                  data = r.json()
                  if data.get('code') == 200 and data.get('data'):
                      for item in data['data'][:30]:
                          word = item.get('name', '').strip()
                          if any(k in word for k in GAME_KEYWORDS):
                              toutiao_topics.append({
                                  'rank': 0,
                                  'cat': '行业',
                                  'title': word,
                                  'source': '今日头条',
                                  'company': '',
                                  'hot': '',
                                  'detail': word,
                                  'url': item.get('url', f'https://www.toutiao.com/trending/{word}')
                              })
                      print(f"✅ 今日头条 游戏相关 {len(toutiao_topics)} 条")
          except Exception as e:
              print(f"⚠️ 今日头条热榜抓取失败: {e}")

          # ═══════════════════════════════════════════════════════
          # 来源6：游民星空游戏新闻（爬虫）
          # ═══════════════════════════════════════════════════════
          gamersky_topics = []
          try:
              from bs4 import BeautifulSoup
              r = requests.get('https://www.gamersky.com/news/', timeout=15, headers={
                  **HEADERS, 'Referer': 'https://www.gamersky.com/'
              })
              if r.status_code == 200:
                  soup = BeautifulSoup(r.text, 'lxml')
                  items = soup.select('.newslist .txt, .mid1 .tit, .newslist li')
                  for item in items[:20]:
                      title_el = item.select_one('a') or item.select_one('h3 a') or item.select_one('.tit a')
                      if title_el:
                          title = title_el.get_text(strip=True)
                          href = title_el.get('href', '')
                          if title and any(k in title for k in GAME_KEYWORDS):
                              if href and not href.startswith('http'):
                                  href = 'https://www.gamersky.com' + href
                              gamersky_topics.append({
                                  'rank': 0,
                                  'cat': '行业',
                                  'title': title,
                                  'source': '游民星空',
                                  'company': '',
                                  'hot': '',
                                  'detail': title,
                                  'url': href
                              })
                  print(f"✅ 游民星空 游戏相关 {len(gamersky_topics)} 条")
          except Exception as e:
              print(f"⚠️ 游民星空抓取失败: {e}")

          # ── 合并 + 去重 + 排序 ──
          all_topics = bilibili_topics + weibo_topics + douyin_topics + zhihu_topics + toutiao_topics + gamersky_topics
          seen_titles = set()
          unique_topics = []
          for t in all_topics:
              key = t['title'][:15]
              if key not in seen_titles:
                  seen_titles.add(key)
                  unique_topics.append(t)

          # 重新编排排名
          for i, t in enumerate(unique_topics[:20]):
              t['rank'] = i + 1
          unique_topics = unique_topics[:20]

          print(f"✅ 最终合并 {len(unique_topics)} 条热点")
          for t in unique_topics:
              print(f"  [{t['source']}] {t['title'][:30]}")

          # ── 写入 data/daily/{date}.json（历史存档）──
          day_label = datetime.strptime(target_date, '%Y-%m-%d').strftime('%-m月%-d日')
          day_label = day_label.replace('January','1月').replace('February','2月') \
                               .replace('March','3月').replace('April','4月') \
                               .replace('May','5月').replace('June','6月') \
                               .replace('July','7月').replace('August','8月') \
                               .replace('September','9月').replace('October','10月') \
                               .replace('November','11月').replace('December','12月')
          weekdays = ['周一','周二','周三','周四','周五','周六','周日']
          wday = weekdays[datetime.strptime(target_date, '%Y-%m-%d').weekday()]
          day_label = day_label + '（' + wday + '）'

          latest_report = {
              'date': target_date,
              'dayLabel': day_label,
              'news': unique_topics
          }

          os.makedirs('data/daily', exist_ok=True)
          with open(f'data/daily/{target_date}.json', 'w', encoding='utf-8') as f:
              json.dump(latest_report, f, ensure_ascii=False, indent=2)
          print(f"✅ 已写入 data/daily/{target_date}.json")

          # ── 写入 data/latest.json（快捷引用，指向当天）──
          with open('data/latest.json', 'w', encoding='utf-8') as f:
              json.dump(latest_report, f, ensure_ascii=False, indent=2)
          print(f"✅ 已写入 data/latest.json（{len(unique_topics)} 条）")

          # ── 4. 写入 data/games.json（游戏日历）──
          games = [
              # ── 测试节点 ──
              {"date":"2026-04-待定","name":"怪物猎人：旅人 二测","company":"腾讯×卡普空","category":"测试","genre":"动作狩猎RPG","platform":"iOS/Android","note":"二测招募中，暂无正式上线公告","source":"http://mho.qq.com/"},
              {"date":"2026-04-21","name":"星布谷地 星旅测试","company":"米哈游","category":"测试","genre":"Q版模拟经营","platform":"iOS/Android/PC","note":"米哈游新IP首测","source":"https://planet.mihoyo.com/"},
              {"date":"2026-04-22","name":"三国：百将牌 删档测试","company":"哔哩哔哩游戏","category":"测试","genre":"竞技卡牌","platform":"iOS/Android/PC/Steam","note":"B站自研卡牌首测","source":"https://3guo.biligame.com/"},
              # ── 公测/上线节点 ──
              {"date":"2026-04-17","name":"王者荣耀世界","company":"腾讯天美","category":"上线","genre":"开放世界MMOARPG","platform":"iOS/Android/PC","note":"全平台公测","source":"https://world.qq.com/"},
              {"date":"2026-04-17","name":"Pragmata","company":"CAPCOM","category":"上线","genre":"科幻动作冒险","platform":"PS5/Xbox/PC/Switch2","note":"全球同步发售","source":"https://www.capcom-games.com/pragmata/zh-hans/"},
              {"date":"2026-04-23","name":"异环","company":"完美世界Hotta","category":"上线","genre":"都市开放世界RPG","platform":"PC/PS5/iOS/Android/鸿蒙","note":"3000万预约，全平台公测","source":"https://yh.wanmei.com/"},
              # ── 周年庆节点 ──
              {"date":"2026-04-26","name":"崩坏星穹铁道 三周年庆","company":"米哈游","category":"周年庆","genre":"回合制RPG","platform":"全平台","note":"三周年庆（2023年4月26日上线）","source":"https://sr.mihoyo.com/"},
              {"date":"2026-05-01","name":"明日方舟 七周年庆","company":"鹰角网络","category":"周年庆","genre":"策略塔防","platform":"全平台","note":"七周年庆（2019年5月1日安卓公测）","source":"https://ak.hypergryph.com/"},
              {"date":"2026-05-23","name":"鸣潮 二周年庆","company":"库洛游戏","category":"周年庆","genre":"开放世界动作RPG","platform":"全平台","note":"二周年庆（2024年5月23日上线）","source":"https://mc.kurogames.com/"},
              {"date":"2026-07-04","name":"绝区零 二周年庆","company":"米哈游","category":"周年庆","genre":"动作RPG","platform":"全平台","note":"二周年庆+2.0版本（2024年7月4日上线）","source":"https://zzz.mihoyo.com/"},
              {"date":"2026-09-28","name":"原神 六周年庆","company":"米哈游","category":"周年庆","genre":"开放世界RPG","platform":"全平台","note":"六周年庆（2020年9月28日上线）","source":"https://ys.mihoyo.com/"},
          ]
          with open('data/games.json', 'w', encoding='utf-8') as f:
              json.dump(games, f, ensure_ascii=False, indent=2)
          print(f"✅ 已写入 data/games.json（{len(games)} 条）")
          EOF

        env:
          TARGET_DATE: ${{ github.event.inputs.target_date || '' }}

      - name: Cleanup old data (keep 365 days)
        run: |
          python3 << 'EOF'
          import os, json
          from datetime import datetime, timedelta

          cutoff = (datetime.now() - timedelta(days=365)).strftime('%Y-%m-%d')
          data_dir = 'data/daily'
          if not os.path.exists(data_dir):
              print("无历史数据目录，跳过清理")
              exit(0)

          deleted = []
          for fname in os.listdir(data_dir):
              if not fname.endswith('.json'):
                  continue
              if fname.replace('.json', '') < cutoff:
                  os.remove(os.path.join(data_dir, fname))
                  deleted.append(fname)

          print(f"✅ 已删除 {len(deleted)} 个旧文件")
          print(f"✅ 保留 {len(os.listdir(data_dir))} 个历史文件")
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Auto update: $(date +%Y-%m-%d)"
          git push
